name: Grade ledger
# Runs daily at 08:10 UTC (4:10 AM ET) — after the last West Coast game ends.
# Grades yesterday's published picks against final scores and updates the
# append-only ledger, then rebuilds the site so the record is live by morning.
on:
  schedule:
    - cron: "10 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    # Needed to decrypt yesterday's board for grading, and to reveal it after.
    env:
      BOARD_ENCRYPTION_KEY: ${{ secrets.BOARD_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Grade yesterday's picks
        run: python scripts/grade.py
      - name: Rebuild site with updated ledger
        env:
          DISCORD_INVITE_URL: ${{ vars.DISCORD_INVITE_URL }}   # optional — join prompt is omitted when unset
          WHOP_CHECKOUT_URL: ${{ vars.WHOP_CHECKOUT_URL }}   # optional — upgrade button omitted when unset
          GHL_WEBHOOK_URL: ${{ vars.GHL_WEBHOOK_URL }}   # optional — email form omitted when unset
        run: |
          # Rebuild against the most recent board so the ledger tab refreshes.
          # Matches .enc as well as .json: today's board is still encrypted at
          # this hour, and only yesterday's has been revealed.
          LATEST=$(ls data/board_*.json data/board_*.enc 2>/dev/null \
                   | sed -E 's#.*board_(.*)\.(json|enc)$#\1#' | sort -u | tail -1)
          if [ -n "$LATEST" ]; then python scripts/build_site.py "$LATEST"; fi
      - name: Post results recap to Discord
        env:
          DISCORD_WEBHOOK_URL_LEDGER: ${{ secrets.DISCORD_WEBHOOK_URL_LEDGER }}   # results channel; falls back to DISCORD_WEBHOOK_URL if unset
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}                 # optional fallback
          SITE_URL: ${{ vars.SITE_URL }}                                          # optional
        run: python scripts/post_discord.py recap
      - name: Commit ledger and site
        run: |
          git config user.name "openledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ index.html feed.xml
          git diff --cached --quiet || git commit -m "Grade $(date -u -d yesterday +%F)"
          git push
