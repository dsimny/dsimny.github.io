name: Morning board
# Target is 15:10 UTC (11:10 AM ET in summer): after probable pitchers and
# morning lines are posted, well before the earliest first pitch.
#
# Three windows, not one. GitHub's cron is best-effort and ran the grading job
# five hours late on 2026-07-22; a delay like that would push the board past
# first pitch. Whichever window fires first builds the board, and the rest exit
# immediately because a commitment already exists for the date. The engine also
# refuses to publish any game that has already started, so a very late run
# produces a short board or none at all rather than a dishonest one.
on:
  schedule:
    - cron: "10 13 * * *"   # 9:10 AM ET
    - cron: "10 14 * * *"   # 10:10 AM ET
    - cron: "10 15 * * *"   # 11:10 AM ET, the intended time
  workflow_dispatch: {}   # manual "run now" button in the Actions tab

permissions:
  contents: write

jobs:
  board:
    runs-on: ubuntu-latest
    # Every step here either writes or reads the encrypted board, so the key is
    # set once for the job rather than repeated five times.
    env:
      BOARD_ENCRYPTION_KEY: ${{ secrets.BOARD_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Fetch data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional — board runs without it
        run: python scripts/fetch_data.py
      - name: Run engine (10,000 sims/game + circuit breakers)
        run: python scripts/engine.py
      - name: Build site
        env:
          DISCORD_INVITE_URL: ${{ vars.DISCORD_INVITE_URL }}   # optional — join prompt is omitted when unset
          WHOP_CHECKOUT_URL: ${{ vars.WHOP_CHECKOUT_URL }}   # optional — upgrade button omitted when unset
          GHL_WEBHOOK_URL: ${{ vars.GHL_WEBHOOK_URL }}   # optional — email form omitted when unset
        run: python scripts/build_site.py
      - name: Post free pick to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}   # optional
          SITE_URL: ${{ vars.SITE_URL }}                            # optional
        run: python scripts/post_discord.py pick
      - name: Post held plays to the members channel
        env:
          DISCORD_WEBHOOK_URL_MEMBERS: ${{ secrets.DISCORD_WEBHOOK_URL_MEMBERS }}   # optional
          SITE_URL: ${{ vars.SITE_URL }}                                            # optional
        run: python scripts/post_discord.py board
      - name: Commit board and site
        run: |
          git config user.name "openledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ index.html feed.xml
          git diff --cached --quiet || git commit -m "Board $(date -u +%F)"
          git push
